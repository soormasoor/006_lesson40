<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <h1>Pomodoro Dashboard</h1>
      <div id="phase">Press START</div>
      <div id="timer">25:00</div>
      <div id="sessions">Completed sessions: 0</div>
      <div id="message"></div>

      <div class="buttons">
        <button class="start" id="startBtn">Start</button>
        <button class="pause" id="pauseBtn">Pause</button>
        <button class="resume" id="resumeBtn">Resume</button>
        <button class="reset" id="resetBtn">Reset</button>
      </div>
    </div>

    <script src="v2.js" defer />
  </body>
</html>
